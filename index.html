<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO_YOUR_NAME | Personal Homepage</title>
  <meta name="description" content="TODO_YOUR_SHORT_BIO" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header" id="top">
    <nav class="nav container">
      <a class="brand" href="#top">TODO_YOUR_NAME</a>
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#experience">Experience</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#awards">Awards</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="container hero-content">
        <img id="avatar" class="avatar" src="assets/avatar.jpg" alt="Profile photo" />
        <h1 id="name">TODO_YOUR_NAME</h1>
        <p id="title" class="title">TODO_YOUR_TITLE</p>
        <p id="email" class="email">TODO_YOUR_EMAIL</p>
        <div id="socialLinks" class="social-links"></div>
      </div>
    </section>

    <section id="about" class="section container">
      <h2>About</h2>
      <p id="aboutText"></p>
      <div class="interests-block">
        <h3>Interests</h3>
        <ul id="interestList"></ul>
      </div>
    </section>

    <section id="experience" class="section container">
      <h2>Experience</h2>
      <div id="experienceList" class="timeline"></div>
    </section>

    <section id="publications" class="section container">
      <h2>Publications</h2>
      <div id="publicationList" class="card-grid"></div>
    </section>

    <section id="projects" class="section container">
      <h2>Projects</h2>
      <div id="projectList" class="card-grid"></div>
    </section>

    <section id="awards" class="section container">
      <h2>Awards</h2>
      <ul id="awardList" class="simple-list"></ul>
    </section>

    <section id="contact" class="section container">
      <h2>Contact</h2>
      <p id="contactLine"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span id="footerName">TODO_YOUR_NAME</span>
      <a href="#top">Back to top</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
